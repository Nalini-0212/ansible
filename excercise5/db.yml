---
- name: Provisioning of servers
  hosts: all
  become: yes
  gather_facts: True
  vars_files:
    - /home/ubuntu/vprofile/excercise5/group_vars/vars.yml 

  tasks:
    - name: install NTP service on Ubuntu
      ansible.builtin.apt:
        name: "{{packages}}"
        state: present
        update_cache: yes
      when: ansible_facts.distribution== "Ubuntu"
    - name: install NTP service on Amazon Linux
      ansible.builtin.yum:
        name: "{{packages}}"
        state: present
        update_cache: yes
      when: ansible_facts.distribution== "Amazon"

    - name: start NTP service on Ubuntu
      ansible.builtin.service:
        name: chrony
        state: started
        enabled: yes
      when: ansible_facts.distribution== "Ubuntu"

    - name: start NTP service on Amazon Linux
      ansible.builtin.service:
        name: chronyd
        state: started
        enabled: yes
      when: ansible_facts.distribution== "Amazon"
